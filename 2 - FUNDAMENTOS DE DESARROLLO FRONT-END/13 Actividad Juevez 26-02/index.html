<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // declaracion
        function calcularTotal(precio, cantidad){ // nombre : calcular total / (precio, cantidad) -> parametros
            let total = precio * cantidad         // cuerpo : suma y reglas, operaciones
            return total;                         //retorno : total final
        }
        // invocacion
        console.log(calcularTotal(10,20))
    </script>
</body>
</html>
